<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>City Game - Kaart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      background: #000;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 12px rgba(0, 0, 0, .12);
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .game-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .locations-found {
      font-size: 12px;
      font-weight: 600;
      color: #8c8c8c;
    }

    .timer {
      font-size: 22px;
      font-weight: 700;
      color: #c1331d;
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .wordbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, .96);
      backdrop-filter: blur(12px);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, .12);
    }

    .letter-box {
      width: 40px;
      height: 48px;
      border-bottom: 3px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      transition: all .3s;
    }

    .letter-box.found {
      border-color: #c1331d;
      color: #c1331d;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, .15) !important;
      padding: 0 !important;
      overflow: hidden;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 230px !important;
    }

    .popup-inner {
      padding: 16px;
    }

    .popup-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .popup-desc {
      font-size: 12px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .popup-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #c1331d;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .popup-btn.completed {
      background: #34c759;
      cursor: default;
    }

    .custom-marker {
      width: 36px;
      height: 36px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: #c1331d;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-marker.completed {
      background: #34c759;
    }

    .custom-marker span {
      transform: rotate(45deg);
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .player-marker {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #007aff;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 255, .3);
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="game-title" id="team-label">City Game</span>
      <span class="locations-found" id="found-label">0 van 0 locaties voltooid</span>
    </div>
    <div class="timer" id="timer">--:--:--</div>
  </div>
  <div id="map"></div>
  <div class="wordbar" id="wordbar"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const API_BASE = 'http://localhost:8080';
    const TEAM_TOKEN_KEY = 'teamToken';
    const teamToken = localStorage.getItem(TEAM_TOKEN_KEY);
    if (!teamToken) window.location.href = 'index.html';

    function clearTeamSession() {
      localStorage.removeItem(TEAM_TOKEN_KEY);
    }
    function authHeaders() { return teamToken ? { Authorization: `Bearer ${teamToken}` } : {}; }

    async function fetchJson(path) {
      const response = await fetch(`${API_BASE}${path}`, { credentials: 'include', headers: authHeaders() });
      const text = await response.text();
      let data = null;
      if (text) { try { data = JSON.parse(text); } catch { data = { message: text }; } }
      if (!response.ok) throw new Error(data?.message || `HTTP ${response.status}`);
      return data;
    }

    let me = null;
    let locations = [];
    let completed = new Set();
    let endTime = null;
    let playerMarker = null;
    let timerStarted = false;

    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([36.7213, -4.4193], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function loadIdentity() {
      me = await fetchJson('/api/game/me');
      document.getElementById('team-label').textContent = me.teamName;
    }

    async function loadLocations() { locations = await fetchJson(`/api/game/${me.gameId}/locations`); }

    async function loadProgress() {
      const data = await fetchJson(`/api/team/${me.teamId}/progress`);
      completed = new Set();
      if (!Array.isArray(data)) return;
      data.forEach((item) => {
        const location = locations.find((loc) => loc.taskId === item.taskId);
        if (location) completed.add(location.id);
      });
    }

    async function loadState() {
      const game = await fetchJson(`/api/game/${me.gameId}/state`);
      if (game.endTime) { endTime = new Date(game.endTime); startTimer(); }
      if (game.status === 'WAITING') window.location.href = 'lobby.html';
      if (game.status === 'FINISHED') { clearTeamSession(); window.location.href = 'index.html'; }
    }

    function renderMarkers() {
      map.eachLayer((layer) => {
        if (layer instanceof L.Marker) map.removeLayer(layer);
      });
      locations.forEach((loc) => {
        const isCompleted = completed.has(loc.id);
        const icon = L.divIcon({
          className: '',
          html: `<div class="custom-marker ${isCompleted ? 'completed' : ''}"><span>${isCompleted && loc.character || '?'}</span></div>`,
          iconSize: [36, 36],
          iconAnchor: [18, 36],
          popupAnchor: [0, -36]
        });
        const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
        marker.bindPopup(`
          <div class="popup-inner">
            <div class="popup-name">${loc.name}</div>
            <div class="popup-desc">${loc.description || ''}</div>
            <button class="popup-btn ${isCompleted ? 'completed' : ''}" onclick="openTask(${loc.id})" ${isCompleted ? 'disabled' : ''}>
              ${isCompleted ? 'Voltooid' : 'Open opdracht'}
            </button>
          </div>
        `, { closeButton: false });
      });
      if (playerMarker) playerMarker.addTo(map);
    }

    function renderWordBar() {
      const wordbar = document.getElementById('wordbar');
      wordbar.innerHTML = '';
      locations.forEach((loc) => {
        const box = document.createElement('div');
        box.className = `letter-box${completed.has(loc.id) ? ' found' : ''}`;
        box.textContent = completed.has(loc.id) ? (loc.character || '?') : '';
        wordbar.appendChild(box);
      });
      document.getElementById('found-label').textContent = `${completed.size} van ${locations.length} locaties voltooid`;
    }

    function openTask(locationId) { window.location.href = `task.html?locationId=${locationId}`; }

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      setInterval(() => {
        if (!endTime) return;
        const diff = endTime.getTime() - Date.now();
        if (diff <= 0) {
          document.getElementById('timer').textContent = '0:00:00';
          clearTeamSession();
          window.location.href = 'index.html';
          return;
        }
        const totalSeconds = Math.floor(diff / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        document.getElementById('timer').textContent = `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }, 1000);
    }

    function startGeolocation() {
      if (!navigator.geolocation) return;
      navigator.geolocation.watchPosition((position) => {
        const playerIcon = L.divIcon({ className: '', html: '<div class="player-marker"></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
        const latLng = [position.coords.latitude, position.coords.longitude];
        if (playerMarker) {
          playerMarker.setLatLng(latLng);
        } else {
          playerMarker = L.marker(latLng, { icon: playerIcon }).addTo(map);
          map.setView(latLng, 15);
        }
      }, null, { enableHighAccuracy: true });
    }

    async function init() {
      try {
        await loadIdentity();
        await loadLocations();
        await loadProgress();
        renderMarkers();
        renderWordBar();
        await loadState();
        startGeolocation();
      } catch {
        clearTeamSession();
        window.location.href = 'index.html';
      }
    }

    init();
  </script>
</body>

</html>
