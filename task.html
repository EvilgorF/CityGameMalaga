<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>City Game - Opdracht</title>
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Specifieke stijlen voor de opdrachtpagina binnen de card */
    .task-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .task-location-name {
      font-size: 20px;
      font-weight: 700;
      color: #111;
      margin-top: 8px;
    }

    .task-description {
      font-size: 14px;
      line-height: 1.5;
      color: #555;
      margin-bottom: 20px;
    }

    /* Foto upload sectie */
    .upload-area {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #ececec;
      border: 2px dashed #bbb;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }

    .upload-area img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-placeholder {
      text-align: center;
      color: #777;
      padding: 20px;
    }

    .upload-placeholder svg {
      width: 40px;
      height: 40px;
      fill: #999;
      margin-bottom: 10px;
    }

    /* Overlay voor succes */
    #success-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.98);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    #success-overlay.show {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="bg"></div>

    <header>
      <img src="img/icon_192.png" alt="City Game" class="logo-img" />
    </header>

    <main>
      <div class="card">
        <div class="task-header">
          <div class="winner-label">Huidige Locatie</div>
          <div class="task-location-name" id="location-name">Laden...</div>
        </div>

        <p class="task-description" id="location-desc">Maak een creatieve foto van je team op deze locatie om de
          volgende letter te verdienen!</p>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" accept="image/*" capture="environment" style="display: none;"
            onchange="handleFile(this)">
          <div id="preview-container" class="upload-placeholder">
            <svg viewBox="0 0 24 24">
              <path
                d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
            </svg>
            <p>Tik om een foto te maken</p>
          </div>
        </div>

        <button class="btn" id="submit-btn" onclick="submitTask()">Foto versturen</button>
        <p class="error-msg" id="error-msg" style="display: none;"></p>
      </div>
    </main>

    <nav>
      <button class="nav-item" onclick="window.location.href='game.html'">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
          </svg>
        </div>
        <span class="nav-label">Terug</span>
      </button>
      <button class="nav-item active">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L10 13.17l7.59-7.59L19 7l-9 9z" />
          </svg>
        </div>
        <span class="nav-label">Opdracht</span>
      </button>
    </nav>
  </div>

  <div id="success-overlay">
    <div class="trophy">✅</div>
    <h2 class="finish-title">Foto goedgekeurd!</h2>
    <p id="success-subtitle" class="task-description"></p>
    <button class="btn" onclick="window.location.href='game.html'">Volgende locatie</button>
  </div>
  <script>
    const API_BASE = 'http://localhost:8080';
    const TEAM_TOKEN_KEY = 'teamToken';
    const teamToken = localStorage.getItem(TEAM_TOKEN_KEY);
    const locationId = new URLSearchParams(window.location.search).get('locationId');

    if (!locationId || !teamToken) window.location.href = 'game.html';

    function authHeaders() { return { Authorization: `Bearer ${teamToken}` }; }

    let selectedFile = null;
    let locationData = null;
    let currentTeamName = 'Jullie team';

    async function fetchJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: { ...(options.headers || {}), ...authHeaders() }
      });
      const text = await response.text();
      let data = null;
      if (text) { try { data = JSON.parse(text); } catch { data = { message: text }; } }
      if (!response.ok) throw new Error(data?.message || `HTTP ${response.status}`);
      return data;
    }

    async function loadLocation() {
      try {
        const me = await fetchJson('/api/game/me');
        currentTeamName = me.teamName || currentTeamName;

        locationData = await fetchJson(`/api/location/${locationId}`);

        document.getElementById('location-name').textContent = locationData.name;
        document.getElementById('task-description').textContent = locationData.taskDescription || locationData.description || '';

        if (locationData.photo) {
          const img = document.getElementById('location-photo');
          const placeholder = document.getElementById('photo-placeholder');
          img.src = locationData.photo;
          img.onload = () => {
            img.style.display = 'block';
            placeholder.style.display = 'none';
          };
        }
      } catch (err) {
        console.error(err);
        window.location.href = 'game.html';
      }
    }

    document.getElementById('photo-input').addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      selectedFile = file;

      const reader = new FileReader();
      reader.onload = (e) => {
        const area = document.getElementById('upload-area');
        area.className = 'upload-area has-photo';
        area.innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
      };
      reader.readAsDataURL(file);
      document.getElementById('submit-btn').disabled = false;
    });

    async function submitPhoto() {
      if (!selectedFile) return;
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');

      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = '';
      err.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('photo', selectedFile);
        formData.append('locationId', locationId);

        const data = await fetchJson('/api/task/submit', {
          method: 'POST',
          body: formData
        });

        const letter = (data.character || locationData.character || '?').trim();

        if (data.finalTargetLat && data.finalTargetLng) {
          sessionStorage.setItem('winner', currentTeamName);
          sessionStorage.setItem('finalTargetName', data.finalTargetName || 'Eindlocatie');
          sessionStorage.setItem('finalTargetLat', data.finalTargetLat);
          sessionStorage.setItem('finalTargetLng', data.finalTargetLng);
          window.location.href = 'finish.html';
          return;
        }

        document.getElementById('success-subtitle').innerHTML = `Goed gedaan! Je hebt de letter <b style="color:#c1331d; font-size:20px;">${letter}</b> verdiend.`;
        document.getElementById('success-overlay').classList.add('show');
      } catch (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = 'Foto versturen';
      }
    }

    loadLocation();
  </script>
</body>

</html>
