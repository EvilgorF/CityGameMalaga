<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>City Game – Einde</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .frame {
      display: flex !important;
      flex-direction: column !important;
      align-items: center;
      justify-content: center;
    }

    .finish-card {
      position: relative;
      z-index: 3;
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 40px 28px;
      width: min(85vw, 340px);
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .trophy { font-size: 64px; }

    .finish-title {
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      color: #1a1a1a;
    }

    .winner-label {
      font-size: 13px;
      font-weight: 700;
      color: #d1030b;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .winner-name {
      font-size: clamp(24px, 7vw, 32px);
      font-weight: 700;
      color: #d1030b;
    }

    .word-display {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .word-letter {
      width: 38px;
      height: 46px;
      border-bottom: 3px solid #d1030b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #d1030b;
    }

    .home-btn {
      width: 100%;
      height: 52px;
      background: #d1030b;
      border: none;
      border-radius: 14px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="frame">
    <img class="image" src="img/Achtergrond.png" alt="" aria-hidden="true" />

    <div class="finish-card">
      <div class="trophy">🏆</div>
      <div class="finish-title">Spel voorbij!</div>

      <div class="winner-label">Winnaar</div>
      <div class="winner-name" id="winner-name">—</div>

      <div class="word-display" id="word-display"></div>

      <button class="home-btn" onclick="goHome()">Terug naar start</button>
    </div>
  </main>

  <script>
    const winner = localStorage.getItem('winner') || '—';
    document.getElementById('winner-name').textContent = winner;

    // Toon het woord MALAGA
    const word = 'MALAGA';
    const wordDisplay = document.getElementById('word-display');
    word.split('').forEach(letter => {
      const box = document.createElement('div');
      box.className = 'word-letter';
      box.textContent = letter;
      wordDisplay.appendChild(box);
    });

    function goHome() {
      localStorage.clear();
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
