<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>City Game - Einde</title>
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Specifieke stijlen voor de finish resultaten binnen de standaard card */
    .trophy {
      font-size: 64px;
      text-align: center;
      margin-bottom: 10px;
    }

    .finish-title {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      text-align: center;
      margin-bottom: 20px;
    }

    .winner-box {
      text-align: center;
      margin-bottom: 24px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(209, 3, 11, 0.05);
      border: 1px solid rgba(209, 3, 11, 0.1);
    }

    .winner-label {
      font-size: 11px;
      font-weight: 700;
      color: #d1030b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .winner-name {
      font-size: 28px;
      font-weight: 700;
      color: #d1030b;
    }

    .target-info {
      background: #f4f4f4;
      border: 1px solid #ddd;
      padding: 14px;
      margin-bottom: 20px;
      display: none;
      /* Wordt getoond via JS */
    }

    .target-info.show {
      display: block;
    }

    .target-info strong {
      display: block;
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }

    .target-text {
      font-size: 14px;
      color: #333;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="bg"></div>

    <header>
      <img src="img/icon_192.png" alt="City Game" class="logo-img" />
    </header>

    <main>
      <div class="card">
        <div class="trophy">🏆</div>
        <h1 class="finish-title">Spel voorbij!</h1>

        <div class="winner-box">
          <div class="winner-label">Winnaar</div>
          <div class="winner-name" id="winner-name">Teamnaam</div>
        </div>

        <div class="target-info" id="target-card">
          <strong>Eindlocatie</strong>
          <div class="target-text" id="target-name">-</div>
          <div class="target-text" id="target-coords" style="font-family: monospace; margin-top: 4px;">-</div>
        </div>

        <button class="btn" onclick="goHome()">Terug naar start</button>
      </div>
    </main>
  </div>
  </main>
  <script>
    const finalTargetName = sessionStorage.getItem('finalTargetName');
    const finalTargetLat = sessionStorage.getItem('finalTargetLat');
    const finalTargetLng = sessionStorage.getItem('finalTargetLng');
    const winner = sessionStorage.getItem('winner') || 'Jullie team';

    if (!finalTargetLat || !finalTargetLng) {
      window.location.href = 'index.html';
    }

    document.getElementById('winner-name').textContent = winner;

    const wordDisplay = document.getElementById('word-display');
    'MALAGA'.split('').forEach((letter) => {
      const box = document.createElement('div');
      box.className = 'word-letter';
      box.textContent = letter;
      wordDisplay.appendChild(box);
    });

    if (finalTargetLat && finalTargetLng) {
      document.getElementById('target-card').classList.add('show');
      document.getElementById('target-name').textContent = finalTargetName || 'Eindlocatie';
      document.getElementById('target-coords').textContent = `Coordinaten: ${Number(finalTargetLat).toFixed(5)}, ${Number(finalTargetLng).toFixed(5)}`;
    }

    function goHome() {
      localStorage.removeItem('teamToken');
      sessionStorage.removeItem('winner');
      sessionStorage.removeItem('finalTargetName');
      sessionStorage.removeItem('finalTargetLat');
      sessionStorage.removeItem('finalTargetLng');
      window.location.href = 'index.html';
    }
  </script>
</body>

</html>
