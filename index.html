<!DOCTYPE html>
<html lang="nl">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="City Game" />
  <meta name="theme-color" content="#d1030b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta charset="utf-8" />
  <title>City Game</title>

  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/style.css" />

  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <link rel="icon" href="img/icon-192.png" />
</head>

<body>
  <div class="app">
    <div class="bg"></div>

    <header></header>

    <hr class="divider" />

    <main>
      <div class="card">
        <p class="card-title">Voer je gegevens in</p>

        <form id="joinForm" novalidate>
          <div class="field">
            <label for="team-name">Team naam</label>
            <input
              id="team-name"
              type="text"
              placeholder="Bijv. Team Alpha"
              autocomplete="off"
              maxlength="15"
              required
            />
          </div>

          <div class="field">
            <label for="spel-pin">Spel PIN</label>
            <input
              id="spel-pin"
              type="text"
              placeholder="6-cijferige code"
              autocomplete="off"
              inputmode="numeric"
              maxlength="6"
              required
            />
          </div>

          <button type="submit" class="btn">Bevestigen</button>
          <p class="error-msg" id="error-msg"></p>
        </form>
      </div>
    </main>

    <nav>
      <button class="nav-item" onclick="alert('Info')">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
        </div>
        <span class="nav-label">Info</span>
      </button>

      <button class="nav-item active">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
          </svg>
        </div>
        <span class="nav-label">PIN invoeren</span>
      </button>

      <button class="nav-item" onclick="window.location.href='/admin'">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.5-2.33 6.79-5 7.93-2.67-1.14-5-4.43-5-7.93V7.18L12 5z"/>
          </svg>
        </div>
        <span class="nav-label">Admin</span>
      </button>
    </nav>
  </div>

  <script src="js/main_screen.js"></script>
</body>
</html>
