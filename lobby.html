<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>City Game - Lobby</title>
  <link rel="stylesheet" href="css/globals.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/lobby.css" />
</head>

<body>
  <div class="app">
    <div class="bg"></div>
    <main class="lobby-main">
      <div class="shell">
        <div class="eyebrow">Lobby</div>
        <h1>Wacht op het startsignaal</h1>
        <p class="subtitle">De beheerder maakt alles klaar. Zodra het spel start, ga je automatisch door naar de kaart.
        </p>
        <section class="team-box">
          <div class="team-label">Team</div>
          <div class="team-name" id="team-name">Laden...</div>
        </section>
        <section class="info-grid">
          <div class="info-row"><span>Status</span><strong id="game-status">Wachten</strong></div>
          <div class="info-row"><span>Starttijd</span><strong id="start-time">-</strong></div>
          <div class="info-row"><span>Eindtijd</span><strong id="end-time">-</strong></div>
          <div class="info-row">
            <span>Verbinding</span>
            <strong class="conn-status">
              <span class="dot" id="conn-dot"></span>
              <span id="conn-label">Verbinden...</span>
            </strong>
          </div>
        </section>
        <p class="note">Laat deze pagina open. Als het spel al gestart of afgelopen is, word je meteen doorgestuurd.</p>
        <div class="actions">
          <button class="primary" id="refresh-btn">Status vernieuwen</button>
          <button class="secondary" id="leave-btn">Lobby verlaten</button>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
  <script>
    const API_BASE = 'http://localhost:8080';
    const TEAM_TOKEN_KEY = 'teamToken';
    const teamToken = localStorage.getItem(TEAM_TOKEN_KEY);
    const connDot = document.getElementById('conn-dot');
    const connLabel = document.getElementById('conn-label');
    let currentGameId = null;

    function clearTeamSession() {
      localStorage.removeItem(TEAM_TOKEN_KEY);
      sessionStorage.removeItem('winner');
      sessionStorage.removeItem('finalTargetName');
      sessionStorage.removeItem('finalTargetLat');
      sessionStorage.removeItem('finalTargetLng');
    }
    function authHeaders() { return teamToken ? { Authorization: `Bearer ${teamToken}` } : {}; }

    async function fetchJson(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, { credentials: 'include', ...options, headers: { ...(options.headers || {}), ...authHeaders() } });
      const text = await response.text();
      let data = null;
      if (text) { try { data = JSON.parse(text); } catch { data = { message: text }; } }
      if (!response.ok) throw new Error(data?.message || `HTTP ${response.status}`);
      return data;
    }

    function formatDate(value) { return value ? new Date(value).toLocaleString('nl-NL') : '-'; }

    async function loadState() {
      const me = await fetchJson('/api/game/me');
      currentGameId = me.gameId;
      document.getElementById('team-name').textContent = me.teamName;
      const game = await fetchJson(`/api/game/${me.gameId}/state`);
      document.getElementById('game-status').textContent = game.status;
      document.getElementById('start-time').textContent = formatDate(game.startTime);
      document.getElementById('end-time').textContent = formatDate(game.endTime);
      if (game.status === 'ACTIVE') window.location.href = 'game.html';
      if (game.status === 'FINISHED') { clearTeamSession(); window.location.href = 'index.html'; }
    }

    function connectWS(gameId) {
      const client = new StompJs.Client({
        webSocketFactory: () => new SockJS(`${API_BASE}/ws`),
        reconnectDelay: 3000,
        onConnect: () => {
          connDot.className = 'dot connected';
          connLabel.textContent = 'Verbonden';
          client.subscribe(`/topic/game/${gameId}`, (message) => {
            const event = JSON.parse(message.body);
            if (event.status === 'ACTIVE') window.location.href = 'game.html';
            if (event.status === 'FINISHED') { clearTeamSession(); window.location.href = 'index.html'; }
          });
        },
        onDisconnect: () => { connDot.className = 'dot'; connLabel.textContent = 'Verbroken'; },
        onStompError: () => { connDot.className = 'dot error'; connLabel.textContent = 'Fout'; }
      });
      window._stompClient = client;
      client.activate();
    }

    document.getElementById('refresh-btn').addEventListener('click', () => loadState().catch(handleFailure));
    document.getElementById('leave-btn').addEventListener('click', async () => {
      try {
        await fetch(`${API_BASE}/api/leave`, { method: 'DELETE', credentials: 'include', headers: authHeaders() });
      } finally {
        if (window._stompClient) window._stompClient.deactivate();
        clearTeamSession();
        window.location.href = 'index.html';
      }
    });

    function handleFailure() { clearTeamSession(); window.location.href = 'index.html'; }

    async function init() {
      if (!teamToken) { window.location.href = 'index.html'; return; }
      try { await loadState(); connectWS(currentGameId); } catch { handleFailure(); }
    }

    init();
  </script>
</body>

</html>
